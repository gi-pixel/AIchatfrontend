<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI INTERFACE</title>
    <style>
        :root {
            --bg: #09090b;
            --card: #18181b;
            --border: #27272a;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text: #fafafa;
            --muted: #a1a1aa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            line-height: 1.5;
            padding-bottom: 40px;
        }

        /* --- Header --- */
        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand { font-weight: 800; letter-spacing: -0.05em; font-size: 1.2rem; }

        .icon-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .icon-btn:hover { background: var(--border); }

        /* --- Container --- */
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
        }

        .section-title {
            font-size: 0.875rem;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 12px;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }

        /* --- Inputs --- */
        select, input, textarea {
            width: 100%;
            background: #030303;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            color: white;
            font-size: 0.95rem;
            margin-bottom: 12px;
            outline: none;
        }

        select:focus, input:focus, textarea:focus {
            border-color: var(--primary);
        }

        .btn-full {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-full:hover { background: var(--primary-hover); }

        /* --- Response Areas --- */
        .response {
            margin-top: 15px;
            padding: 12px;
            background: #000;
            border-radius: 8px;
            font-size: 0.9rem;
            border-left: 2px solid var(--primary);
            white-space: pre-wrap;
            min-height: 40px;
        }

        .badge {
            display: inline-block;
            background: var(--border);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        /* --- Modal --- */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div class="brand">AI NEXUS</div>
    <button class="icon-btn" id="menuBtn" title="API Settings">🔑</button>
</header>

<div class="container">
    <div class="section-title">Configuration</div>
    <div class="card">
        <button class="btn-full" id="fetchModelsBtn" style="background: #27272a;">Refresh Model List</button>
        <div id="modelsList" class="response" style="margin-top:10px;">No models loaded.</div>
    </div>

    <div class="section-title">Chat Interface</div>
    <div class="card">
        <select id="chatModelSelect"><option value="">Select a model</option></select>
        <input type="text" id="systemPromptInput" placeholder="System Behavior (e.g. You are a helpful assistant)">
        <textarea id="chatMsg" rows="4" placeholder="Type your message..."></textarea>
        <label style="font-size: 12px; color: var(--muted);">Attach Image (Optional)</label>
        <input type="file" id="chatFileInput" accept="image/*">
        <button class="btn-full" id="sendChatBtn">Send Message</button>
        <div id="chatResult" class="response">Waiting for prompt...</div>
    </div>

    <div class="section-title">Visual Generation</div>
    <div class="card">
        <select id="genType">
            <option value="chat">Standard Image</option>
            <option value="logo">Logo Design</option>
        </select>
        <input type="text" id="imgPromptInput" placeholder="Describe what you want to see...">
        <button class="btn-full" id="genImageBtn" style="background: #8b5cf6;">Generate Visual</button>
        <div id="imgResult" class="response" style="text-align: center;"></div>
    </div>
</div>

<div class="modal" id="apiModal">
    <div class="modal-content">
        <h3 style="margin-bottom: 16px;">API Configuration</h3>
        <p style="font-size: 0.85rem; color: var(--muted); margin-bottom: 12px;">Your key is stored locally in your browser.</p>
        <input type="password" id="apiTokenInput" placeholder="sk-...">
        <button class="btn-full" id="saveApiBtn">Save Settings</button>
        <button class="btn-full" id="closeModal" style="background:transparent; margin-top:8px;">Cancel</button>
    </div>
</div>

<script>
    let API_TOKEN = localStorage.getItem('ai_fuck_token') || '';

    // UI Controls
    const apiModal = document.getElementById('apiModal');
    const menuBtn = document.getElementById('menuBtn');
    const closeModal = document.getElementById('closeModal');
    const saveApiBtn = document.getElementById('saveApiBtn');
    const apiTokenInput = document.getElementById('apiTokenInput');

    // Toggle Modal
    menuBtn.onclick = () => {
        apiTokenInput.value = API_TOKEN;
        apiModal.classList.add('active');
    };
    closeModal.onclick = () => apiModal.classList.remove('active');

    saveApiBtn.onclick = () => {
        const val = apiTokenInput.value.trim();
        if(val) {
            API_TOKEN = val;
            localStorage.setItem('ai_fuck_token', val);
            apiModal.classList.remove('active');
            alert('Token saved.');
        }
    };

    // Auto-open if missing
    if(!API_TOKEN) apiModal.classList.add('active');

    // API Helper
    async function callAPI(endpoint, payload) {
        if(!API_TOKEN) { apiModal.classList.add('active'); throw new Error('API Key Required'); }
        
        const response = await fetch(`https://bot.insta-acc-sec.workers.dev/api/v1/${endpoint}`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${API_TOKEN}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });
        if(!response.ok) throw new Error(`Error: ${response.status}`);
        return response.json();
    }

    // Load Models
    document.getElementById('fetchModelsBtn').onclick = async () => {
        const display = document.getElementById('modelsList');
        const select = document.getElementById('chatModelSelect');
        display.innerText = "Fetching...";
        
        try {
            const res = await fetch('https://bot.insta-acc-sec.workers.dev/api/models', {
                headers: { 'Authorization': `Bearer ${API_TOKEN}` }
            });
            const data = await res.json();
            const models = data.models || [];
            
            display.innerHTML = models.map(m => `<span class="badge">${m}</span>`).join('');
            select.innerHTML = models.map(m => `<option value="${m}">${m}</option>`).join('');
        } catch(e) {
            display.innerText = "Failed to load models. Check your key.";
        }
    };

    // Chat Logic
    document.getElementById('sendChatBtn').onclick = async () => {
        const msg = document.getElementById('chatMsg').value.trim();
        const output = document.getElementById('chatResult');
        if(!msg) return;

        output.innerText = "Thinking...";
        
        try {
            const payload = {
                message: msg,
                model: document.getElementById('chatModelSelect').value,
                systemPrompt: document.getElementById('systemPromptInput').value
            };
            
            const fileInput = document.getElementById('chatFileInput');
            if(fileInput.files[0]) {
                const reader = new FileReader();
                payload.fileData = await new Promise(r => {
                    reader.onload = (e) => r(e.target.result);
                    reader.readAsDataURL(fileInput.files[0]);
                });
            }

            const data = await callAPI('chat', payload);
            output.innerHTML = data.message || data.response || "No response received.";
        } catch(e) {
            output.innerText = e.message;
        }
    };

    // Image/Logo Logic
    document.getElementById('genImageBtn').onclick = async () => {
        const prompt = document.getElementById('imgPromptInput').value.trim();
        const type = document.getElementById('genType').value;
        const output = document.getElementById('imgResult');
        
        if(!prompt) return;
        output.innerText = "Generating...";

        try {
            const endpoint = type === 'logo' ? 'image/logo' : 'image/generate';
            const data = await callAPI(endpoint, { prompt, style: "High GPT4o", imagesNum: 1 });
            
            if(data.image_url) {
                output.innerHTML = `<img src="${data.image_url}" style="width:100%; border-radius:8px; margin-top:10px;">`;
            } else {
                output.innerText = "Success, but no URL returned.";
            }
        } catch(e) {
            output.innerText = e.message;
        }
    };
</script>
</body>
</html>
