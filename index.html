<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI CHAT PRO</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --sidebar: #171717;
            --input-bg: #212121;
            --accent: #3b82f6;
            --text-main: #ececec;
            --text-muted: #b4b4b4;
            --border: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Sneeze', 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- Header --- */
        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(13, 13, 13, 0.8);
            backdrop-filter: blur(10px);
        }

        .model-info { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 5px 10px; border-radius: 8px; transition: 0.2s; }
        .model-info:hover { background: var(--sidebar); }
        .dot { width: 8px; height: 8px; background: #10a37f; border-radius: 50%; }

        .btn-icon { background: none; border: none; color: var(--text-main); cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; transition: 0.2s; }
        .btn-icon:hover { background: var(--sidebar); }

        /* --- Chat Area --- */
        #chatContainer {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            scroll-behavior: smooth;
        }

        .msg { max-width: 85%; line-height: 1.6; font-size: 15px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg.user { align-self: flex-end; background: var(--input-bg); padding: 12px 18px; border-radius: 20px 20px 0 20px; }
        .msg.ai { align-self: flex-start; display: flex; gap: 15px; width: 100%; }
        .ai-avatar { width: 32px; height: 32px; background: #10a37f; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; }
        .ai-content { padding-top: 4px; }
        .ai-content img { max-width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid var(--border); }

        /* --- Input Area --- */
        .input-wrapper { padding: 20px; background: linear-gradient(transparent, var(--bg) 30%); }
        .input-box { 
            max-width: 800px; 
            margin: 0 auto; 
            background: var(--input-bg); 
            border-radius: 26px; 
            padding: 10px 15px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .controls-row { display: flex; gap: 10px; padding: 0 5px; }
        .pill { background: var(--sidebar); border: 1px solid var(--border); padding: 4px 12px; border-radius: 15px; font-size: 11px; color: var(--text-muted); cursor: pointer; transition: 0.2s; }
        .pill:hover { border-color: var(--accent); color: white; }

        .text-area-row { display: flex; align-items: flex-end; gap: 10px; }
        textarea { flex: 1; background: none; border: none; color: white; resize: none; padding: 10px; font-size: 16px; outline: none; max-height: 200px; }
        
        .send-btn { background: white; color: black; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0; margin-bottom: 5px; }
        .send-btn:disabled { background: var(--sidebar); color: var(--text-muted); }

        /* --- Modal --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; backdrop-filter: blur(4px); }
        .modal { background: var(--sidebar); border: 1px solid var(--border); width: 100%; max-width: 400px; border-radius: 20px; padding: 24px; }
        .modal input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; margin: 15px 0; outline: none; }
        .modal button { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-primary { background: var(--accent); color: white; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <div class="model-info" id="modelTrigger">
        <div class="dot"></div>
        <span id="activeModelName">Select Model</span>
        <span style="font-size: 10px; color: var(--text-muted);">▼</span>
    </div>
    <button class="btn-icon" id="menuBtn">🔑</button>
</header>

<div id="chatContainer">
    <div class="msg ai">
        <div class="ai-avatar">✦</div>
        <div class="ai-content">How can I help you today? You can chat, generate images, or design logos using the tools below.</div>
    </div>
</div>

<div class="input-wrapper">
    <div class="input-box">
        <div class="controls-row">
            <div class="pill" id="toolChat">💬 Chat</div>
            <div class="pill" id="toolImg">🎨 Image</div>
            <div class="pill" id="toolLogo">🏷️ Logo</div>
            <input type="file" id="fileIn" hidden>
            <div class="pill" onclick="document.getElementById('fileIn').click()">📎 Attach</div>
        </div>
        <div class="text-area-row">
            <textarea id="userInput" placeholder="Message AI..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn" disabled>↑</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3>API Configuration</h3>
        <p style="color: var(--text-muted); font-size: 13px; margin-top: 8px;">Enter your key to unlock AI features.</p>
        <input type="password" id="apiInput" placeholder="Enter API Token...">
        <button class="btn-primary" id="saveApi">Connect</button>
        <button style="background: none; color: var(--text-muted); margin-top: 10px;" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
    let API_TOKEN = localStorage.getItem('ai_fuck_token') || '';
    let currentMode = 'chat';
    let selectedModel = '';

    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const modal = document.getElementById('modalOverlay');

    // --- UI Interactions ---
    function closeModal() { modal.style.display = 'none'; }
    document.getElementById('menuBtn').onclick = () => {
        document.getElementById('apiInput').value = API_TOKEN;
        modal.style.display = 'flex';
    };

    document.getElementById('saveApi').onclick = () => {
        API_TOKEN = document.getElementById('apiInput').value.trim();
        localStorage.setItem('ai_fuck_token', API_TOKEN);
        closeModal();
        fetchModels();
    };

    userInput.oninput = function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
        sendBtn.disabled = !this.value.trim();
    };

    const setMode = (mode) => {
        currentMode = mode;
        document.querySelectorAll('.pill').forEach(p => p.style.borderColor = 'var(--border)');
        document.getElementById('tool' + mode.charAt(0).toUpperCase() + mode.slice(1)).style.borderColor = 'var(--accent)';
        userInput.placeholder = `Run ${mode} prompt...`;
    };
    ['chat', 'img', 'logo'].forEach(m => document.getElementById('tool'+m.charAt(0).toUpperCase()+m.slice(1)).onclick = () => setMode(m));

    // --- Logic ---
    function addMessage(content, role = 'ai', isImg = false) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        if(role === 'ai') {
            div.innerHTML = `<div class="ai-avatar">✦</div><div class="ai-content">${isImg ? `<img src="${content}">` : content}</div>`;
        } else {
            div.innerText = content;
        }
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function fetchModels() {
        if(!API_TOKEN) return;
        try {
            const res = await fetch('https://bot.insta-acc-sec.workers.dev/api/models', {
                headers: { 'Authorization': `Bearer ${API_TOKEN}` }
            });
            const data = await res.json();
            selectedModel = data.models[0];
            document.getElementById('activeModelName').innerText = selectedModel;
        } catch(e) { console.error("Model fetch failed"); }
    }

    async function handleSend() {
        const text = userInput.value.trim();
        if(!text || !API_TOKEN) return;

        addMessage(text, 'user');
        userInput.value = '';
        userInput.style.height = 'auto';
        
        try {
            let endpoint = '';
            let payload = { prompt: text, style: "High GPT4o", imagesNum: 1 };

            if(currentMode === 'chat') {
                endpoint = 'chat';
                payload = { message: text, model: selectedModel };
            } else if(currentMode === 'img') {
                endpoint = 'image/generate';
            } else {
                endpoint = 'image/logo';
            }

            const res = await fetch(`https://bot.insta-acc-sec.workers.dev/api/v1/${endpoint}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();

            if(currentMode === 'chat') {
                addMessage(data.message || data.response || "No response.");
            } else {
                if(data.image_url) addMessage(data.image_url, 'ai', true);
                else addMessage("Failed to generate image.");
            }
        } catch(e) {
            addMessage("Error: " + e.message);
        }
    }

    sendBtn.onclick = handleSend;
    userInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };

    if(!API_TOKEN) modal.style.display = 'flex';
    else fetchModels();
    setMode('chat');
</script>
</body>
</html>
