<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEO LUXE</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #111111;
            --accent: #ffffff;
            --border: rgba(255,255,255,0.1);
            --text-dim: #888888;
            --gold: #d4af37; /* Luxury accent */
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* --- Onboarding Overlay --- */
        #onboarding {
            position: fixed; inset: 0;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .step { display: none; width: 100%; max-width: 300px; text-align: center; }
        .step.active { display: block; animation: fadeIn 0.5s ease; }
        
        input.lux-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: #fff;
            font-size: 1.2rem;
            padding: 15px 0;
            margin: 20px 0;
            text-align: center;
            outline: none;
            font-weight: 300;
        }
        .lux-btn {
            background: #fff; color: #000;
            padding: 12px 40px; border-radius: 100px;
            border: none; font-weight: 600; font-size: 14px;
            cursor: pointer; letter-spacing: 1px;
        }

        /* --- Main Header --- */
        header {
            padding: calc(15px + env(safe-area-inset-top)) 20px 15px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .welcome-text { font-size: 12px; font-weight: 300; color: var(--text-dim); }
        .welcome-text span { color: #fff; font-weight: 600; }

        .model-picker {
            background: var(--surface);
            border: 1px solid var(--border);
            color: #fff;
            padding: 5px 12px;
            border-radius: 100px;
            font-size: 11px;
            outline: none;
        }

        /* --- Side Panel (Drawer) --- */
        #side-panel {
            position: fixed; right: 0; top: 0; bottom: 0;
            width: 80%; max-width: 320px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 500;
            transform: translateX(100%);
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 60px 25px;
        }
        #side-panel.open { transform: translateX(0); }
        .panel-close { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; }
        .panel-title { font-weight: 600; margin-bottom: 20px; letter-spacing: -0.5px; }
        label { font-size: 10px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }
        textarea.panel-input {
            width: 100%; background: #000; border: 1px solid var(--border);
            border-radius: 12px; padding: 15px; color: #fff;
            margin-top: 10px; resize: none; font-size: 14px; outline: none;
        }

        /* --- Chat Interface --- */
        #chat-stream {
            flex: 1; overflow-y: auto;
            padding: 20px;
            display: flex; flex-direction: column; gap: 30px;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 150px;
        }
        .msg { max-width: 85%; font-weight: 300; font-size: 15px; line-height: 1.6; }
        .msg.user { align-self: flex-end; color: #fff; text-align: right; }
        .msg.ai { align-self: flex-start; color: #ccc; }
        .msg.ai img { width: 100%; border-radius: 20px; margin-top: 15px; border: 1px solid var(--border); }

        /* --- Bottom Input --- */
        .input-container {
            position: fixed; bottom: 0; width: 100%;
            padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg) 80%, transparent);
        }
        .pill {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 8px 10px 8px 20px;
            display: flex; align-items: center; gap: 10px;
        }
        textarea#user-msg {
            flex: 1; background: none; border: none; color: #fff;
            font-size: 16px; outline: none; resize: none;
            max-height: 100px; padding: 5px 0; font-weight: 300;
        }
        .send-icon {
            width: 40px; height: 40px; background: #fff; color: #000;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: none; font-size: 18px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="onboarding">
    <div class="step active" id="step-name">
        <h2 style="font-weight: 600;">Welcome.</h2>
        <p style="color: var(--text-dim); font-size: 13px;">What should we call you?</p>
        <input type="text" id="in-name" class="lux-input" placeholder="Your Name" autocomplete="off">
        <button class="lux-btn" onclick="nextStep(2)">CONTINUE</button>
    </div>
    <div class="step" id="step-token">
        <h2 style="font-weight: 600;">Secure Access.</h2>
        <p style="color: var(--text-dim); font-size: 13px;">Enter your API token to begin.</p>
        <input type="password" id="in-token" class="lux-input" placeholder="sk-..." autocomplete="off">
        <button class="lux-btn" onclick="finishOnboarding()">UNLOCK NEO</button>
    </div>
</div>

<header>
    <div class="welcome-text">WELCOME, <span id="display-name">USER</span> NEO CHAT</div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <select class="model-picker" id="model-select">
            <option>Loading Models...</option>
        </select>
        <div class="menu-btn" style="cursor: pointer; font-size: 20px;" onclick="togglePanel(true)">☰</div>
    </div>
</header>

<div id="side-panel">
    <div class="panel-close" onclick="togglePanel(false)">×</div>
    <h2 class="panel-title">Personality</h2>
    <label>AI Behavior / Instructions</label>
    <textarea id="sys-prompt" class="panel-input" rows="8" placeholder="e.g. You are a professional assistant who speaks with luxury and elegance..."></textarea>
    <button class="lux-btn" style="width: 100%; margin-top: 20px;" onclick="savePersonality()">SAVE PREFERENCES</button>
    <div style="margin-top: 40px; font-size: 10px; color: #444; text-align: center;">NEO PLATINUM v4.0</div>
</div>

<div id="chat-stream">
    </div>

<div class="input-container">
    <div class="pill">
        <textarea id="user-msg" placeholder="Write a message..." rows="1"></textarea>
        <button class="send-icon" id="send-btn">↑</button>
    </div>
</div>

<script>
    let NAME = localStorage.getItem('neo_name');
    let TOKEN = localStorage.getItem('neo_token');
    let SYSTEM = localStorage.getItem('neo_personality') || "You are a helpful assistant.";

    // --- Onboarding Logic ---
    if (!NAME || !TOKEN) {
        document.getElementById('onboarding').style.display = 'flex';
    } else {
        startApp();
    }

    function nextStep(step) {
        if(step === 2 && !document.getElementById('in-name').value.trim()) return;
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step-token').classList.add('active');
    }

    function finishOnboarding() {
        NAME = document.getElementById('in-name').value.trim();
        TOKEN = document.getElementById('in-token').value.trim();
        if(!NAME || !TOKEN) return;
        
        localStorage.setItem('neo_name', NAME);
        localStorage.setItem('neo_token', TOKEN);
        startApp();
    }

    function startApp() {
        document.getElementById('onboarding').style.transform = 'translateY(-100%)';
        document.getElementById('display-name').innerText = NAME.toUpperCase();
        document.getElementById('sys-prompt').value = SYSTEM;
        fetchModels();
    }

    // --- Panel & Settings ---
    function togglePanel(open) {
        document.getElementById('side-panel').classList.toggle('open', open);
    }

    function savePersonality() {
        SYSTEM = document.getElementById('sys-prompt').value;
        localStorage.setItem('neo_personality', SYSTEM);
        togglePanel(false);
    }

    // --- API & Chat ---
    async function fetchModels() {
        try {
            const res = await fetch('https://bot.insta-acc-sec.workers.dev/api/models', {
                headers: { 'Authorization': `Bearer ${TOKEN}` }
            });
            const data = await res.json();
            const select = document.getElementById('model-select');
            select.innerHTML = (data.models || ['gpt_5_3']).map(m => `<option value="${m}">${m.toUpperCase()}</option>`).join('');
        } catch (e) {
            document.getElementById('model-select').innerHTML = '<option>ERROR</option>';
        }
    }

    function addMessage(text, role, isImg = false) {
        const stream = document.getElementById('chat-stream');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = isImg ? `<img src="${text}">` : text;
        stream.appendChild(div);
        stream.scrollTo({ top: stream.scrollHeight, behavior: 'smooth' });
    }

    async function handleSend() {
        const input = document.getElementById('user-msg');
        const text = input.value.trim();
        if(!text) return;

        addMessage(text, 'user');
        input.value = '';
        input.style.height = 'auto';

        try {
            const res = await fetch('/api/chat', { // Points to your Vercel Proxy
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: text,
                    token: TOKEN,
                    model: document.getElementById('model-select').value,
                    systemPrompt: SYSTEM
                })
            });
            const data = await res.json();
            addMessage(data.response || data.message || "No response received.", 'ai');
        } catch(e) {
            addMessage("Request failed. Ensure your Vercel proxy is deployed.", 'ai');
        }
    }

    // --- UI Listeners ---
    document.getElementById('send-btn').onclick = handleSend;
    document.getElementById('user-msg').oninput = function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
    };

    // Keyboard behavior fix for iOS
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.body.style.height = window.visualViewport.height + 'px';
            window.scrollTo(0,0);
        });
    }
</script>
</body>
</html>
