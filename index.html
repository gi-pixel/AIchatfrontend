<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI STUDIO</title>
    <style>
        :root {
            --bg: #050505;
            --surface: #121212;
            --border: #222222;
            --accent: #ffffff;
            --text-dim: #999;
            --safe-top: env(safe-area-inset-top);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; /* Prevents body bounce on mobile */
        }

        /* --- Header: Fixed & Non-Moving --- */
        header {
            position: fixed;
            top: 0; width: 100%;
            padding: calc(15px + var(--safe-top)) 20px 15px;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .status { font-size: 12px; font-weight: 600; letter-spacing: 1px; color: var(--text-dim); }
        .menu-icon { cursor: pointer; font-size: 20px; }

        /* --- Chat Scroll Area --- */
        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 100px 20px 150px; /* Space for fixed header/footer */
            display: flex;
            flex-direction: column;
            gap: 24px;
            -webkit-overflow-scrolling: touch;
        }

        .msg-container { max-width: 90%; }
        .msg-container.user { align-self: flex-end; }
        
        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        
        .user .bubble { background: #222; border-bottom-right-radius: 4px; }
        .ai .bubble { color: #ccc; padding-left: 0; }
        .ai img { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid var(--border); }

        /* --- Bottom Input: Locked to bottom --- */
        .input-area {
            position: fixed;
            bottom: 0; width: 100%;
            padding: 15px 15px calc(20px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg) 80%, transparent);
            z-index: 100;
        }

        .input-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 8px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .tools { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .tools::-webkit-scrollbar { display: none; }
        
        .tool-chip {
            background: #1d1d1d;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 11px;
            white-space: nowrap;
            cursor: pointer;
        }
        .tool-chip.active { background: #fff; color: #000; border-color: #fff; }

        .input-row { display: flex; align-items: center; gap: 10px; }
        textarea {
            flex: 1; background: none; border: none; color: #fff;
            font-size: 16px; outline: none; resize: none;
            max-height: 120px; padding: 8px 0;
        }

        .send-btn {
            background: #fff; color: #000; width: 32px; height: 32px;
            border-radius: 50%; border: none; font-weight: bold; cursor: pointer;
        }

        /* --- Modal --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal.open { display: flex; }
        .modal-inner { width: 85%; max-width: 350px; background: var(--surface); padding: 25px; border-radius: 20px; text-align: center; }
        input[type="text"] { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); border-radius: 10px; color: #fff; margin: 15px 0; }

    </style>
</head>
<body>

<header>
    <div class="status" id="model-name">FETCHING...</div>
    <div class="menu-icon" id="settings-trigger">⚙️</div>
</header>

<div id="chat-flow">
    <div class="msg-container ai">
        <div class="bubble">Ready for your prompt. Select a mode below to start.</div>
    </div>
</div>

<div class="input-area">
    <div class="input-card">
        <div class="tools">
            <div class="tool-chip active" id="mode-chat">Chat</div>
            <div class="tool-chip" id="mode-img">Image Gen</div>
            <div class="tool-chip" id="mode-logo">Logo Design</div>
        </div>
        <div class="input-row">
            <textarea id="prompt-in" placeholder="Ask anything..." rows="1"></textarea>
            <button class="send-btn" id="send-trigger">→</button>
        </div>
    </div>
</div>

<div class="modal" id="settings-modal">
    <div class="modal-inner">
        <h3>API Key</h3>
        <input type="text" id="api-key-input" placeholder="Paste Token Here">
        <button onclick="saveKey()" style="width:100%; padding:12px; border-radius:10px; background:#fff; border:none; font-weight:bold;">Save & Connect</button>
    </div>
</div>

<script>
    let API_TOKEN = localStorage.getItem('ai_token') || '';
    let currentMode = 'chat';
    let models = [];
    let selectedModel = 'gpt_5_3';

    // --- Core Logic ---
    async function apiRequest(endpoint, body) {
        const url = `https://bot.insta-acc-sec.workers.dev/api/v1/${endpoint}`;
        const res = await fetch(url, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${API_TOKEN}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
        });
        if(!res.ok) throw new Error('API Error');
        return res.json();
    }

    async function fetchModels() {
        if(!API_TOKEN) return;
        try {
            const res = await fetch('https://bot.insta-acc-sec.workers.dev/api/models', {
                headers: { 'Authorization': `Bearer ${API_TOKEN}` }
            });
            const data = await res.json();
            models = data.models || [];
            selectedModel = models[0] || 'gpt_5_3';
            document.getElementById('model-name').innerText = selectedModel.toUpperCase();
        } catch(e) {
            document.getElementById('model-name').innerText = "ERROR LOADING";
        }
    }

    // --- UI Logic ---
    const chatFlow = document.getElementById('chat-flow');
    const promptIn = document.getElementById('prompt-in');
    const modal = document.getElementById('settings-modal');

    function appendMsg(text, type, isImg = false) {
        const div = document.createElement('div');
        div.className = `msg-container ${type}`;
        div.innerHTML = `<div class="bubble">${isImg ? `<img src="${text}">` : text}</div>`;
        chatFlow.appendChild(div);
        chatFlow.scrollTop = chatFlow.scrollHeight;
    }

    async function handleSend() {
        const val = promptIn.value.trim();
        if(!val || !API_TOKEN) return;

        appendMsg(val, 'user');
        promptIn.value = '';
        promptIn.style.height = 'auto';

        try {
            if(currentMode === 'chat') {
                const data = await apiRequest('chat', {
                    message: val,
                    model: selectedModel,
                    systemPrompt: "You are a helpful assistant."
                });
                appendMsg(data.message || data.response, 'ai');
            } else if(currentMode === 'img') {
                const data = await apiRequest('image/generate', {
                    prompt: val,
                    style: "High GPT4o",
                    imagesNum: 1
                });
                appendMsg(data.image_url, 'ai', true);
            } else if(currentMode === 'logo') {
                const data = await apiRequest('image/logo', {
                    prompt: val,
                    style: "Minimalistic Logo",
                    imagesNum: 1
                });
                appendMsg(data.image_url, 'ai', true);
            }
        } catch(e) {
            appendMsg("Failed to load. Check API Key or endpoint status.", 'ai');
        }
    }

    // --- Event Listeners ---
    document.getElementById('settings-trigger').onclick = () => modal.classList.add('open');
    
    function saveKey() {
        API_TOKEN = document.getElementById('api-key-input').value.trim();
        localStorage.setItem('ai_token', API_TOKEN);
        modal.classList.remove('open');
        fetchModels();
    }

    function setMode(mode, id) {
        currentMode = mode;
        document.querySelectorAll('.tool-chip').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        promptIn.placeholder = mode === 'chat' ? "Ask anything..." : "Describe image...";
    }

    document.getElementById('mode-chat').onclick = () => setMode('chat', 'mode-chat');
    document.getElementById('mode-img').onclick = () => setMode('img', 'mode-img');
    document.getElementById('mode-logo').onclick = () => setMode('logo', 'mode-logo');

    document.getElementById('send-trigger').onclick = handleSend;
    promptIn.oninput = function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
    };

    // Prevent zoom/keyboard scroll issues on iOS
    promptIn.addEventListener('focus', () => {
        setTimeout(() => {
            window.scrollTo(0, 0);
            document.body.scrollTop = 0;
        }, 50);
    });

    if(!API_TOKEN) modal.classList.add('open');
    else fetchModels();

</script>
</body>
</html>
