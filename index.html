<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aura Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
:root {
  --bg:#0d0d12;
  --surface:#13131c;
  --surface2:#1a1a28;
  --border:rgba(255,255,255,.07);
  --purple:#7c5cfc;
  --purple2:#a78bfa;
  --text:#e8e6f0;
  --muted:#6b6880;
}

{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
}

/ HEADER /
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
}

.brand{
  font-family:'Syne',sans-serif;
  font-weight:700;
}

/ CHAT /
.messages{
  flex:1;
  overflow-y:auto;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.msg{
  max-width:80%;
  padding:10px 14px;
  border-radius:12px;
  line-height:1.5;
}

.user{
  align-self:flex-end;
  background:linear-gradient(135deg,var(--purple),#9b6dff);
  color:#fff;
}

.ai{
  align-self:flex-start;
  background:var(--surface2);
  border:1px solid var(--border);
}

/ INPUT */
.input-area{
  padding:12px;
  border-top:1px solid var(--border);
  background:var(--surface);
  display:flex;
  gap:8px;
}

textarea{
  flex:1;
  resize:none;
  border:none;
  outline:none;
  background:var(--surface2);
  color:var(--text);
  padding:10px;
  border-radius:8px;
}

button{
  background:var(--purple);
  border:none;
  color:#fff;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="brand">Aura Chat</div>
  <select id="model">
    <option value="gpt_5">GPT-5</option>
    <option value="gpt_4o">GPT-4o</option>
  </select>
</div>

<div id="messages" class="messages"></div>

<div class="input-area">
  <textarea id="input" rows="1" placeholder="Message..."></textarea>
  <button id="send">Send</button>
</div>

<script>
const API = "https://bot.insta-acc-sec.workers.dev/api/v1";

const messagesEl = document.getElementById("messages");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");
const modelSelect = document.getElementById("model");

let token = localStorage.getItem("token") || "";
if(!token){
  token = prompt("Enter API token:");
  localStorage.setItem("token",token);
}

function addMessage(role,text){
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

async function send(){
  const text = input.value.trim();
  if(!text) return;

  addMessage("user",text);
  input.value = "";

  const aiMsg = addMessage("ai","...");

  try{
    const res = await fetch(API+"/chat",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+token
      },
      body:JSON.stringify({
        message:text,
        model:modelSelect.value
      })
    });

    if(!res.ok){
      aiMsg.textContent = "Error: "+res.status;
      return;
    }

    // streaming safe
    if(res.body){
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let result = "";

      while(true){
        const {done,value} = await reader.read();
        if(done) break;
        result += decoder.decode(value);
        aiMsg.textContent = result;
      }
    }else{
      const data = await res.json();
      aiMsg.textContent = data.response || JSON.stringify(data);
    }

  }catch(e){
    aiMsg.textContent = "Network error";
  }
}

sendBtn.onclick = send;

input.addEventListener("keydown",e=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
});
</script>

</body>
</html>
