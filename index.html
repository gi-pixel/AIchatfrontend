<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEO CHAT</title>
    <style>
        :root {
            --bg: #000000;
            --card: #111111;
            --border: #222;
            --accent: #3b82f6;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: fixed; /* Prevents background bouncing */
            width: 100%;
        }

        /* --- Modern Top Bar --- */
        header {
            padding: calc(10px + env(safe-area-inset-top)) 20px 10px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo { font-weight: 700; font-size: 17px; letter-spacing: -0.5px; }
        .model-tag { font-size: 10px; background: var(--border); padding: 4px 8px; border-radius: 6px; color: #888; text-transform: uppercase; }

        /* --- Scrollable Chat Area --- */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 120px; /* Space for input */
        }

        .bubble { max-width: 85%; font-size: 15px; line-height: 1.45; }
        .user { align-self: flex-end; background: var(--accent); padding: 10px 16px; border-radius: 18px 18px 2px 18px; color: white; }
        .ai { align-self: flex-start; color: #e0e0e0; }
        .ai img { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid var(--border); }

        /* --- Fixed Bottom Input --- */
        .input-box {
            position: absolute;
            bottom: 0; width: 100%;
            padding: 10px 15px calc(15px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, #000 70%, transparent);
        }

        .inner-input {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            align-items: flex-end;
            padding: 8px 14px;
            gap: 10px;
        }

        textarea {
            flex: 1; background: none; border: none; color: white;
            font-size: 16px; outline: none; resize: none;
            max-height: 150px; padding: 8px 0; line-height: 20px;
        }

        .circle-btn {
            background: #fff; color: #000; width: 32px; height: 32px;
            border-radius: 50%; border: none; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 2px; flex-shrink: 0;
        }

        /* --- Settings Overlay --- */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; padding: 30px;
        }
        .overlay.active { display: flex; }
        .card { width: 100%; max-width: 340px; }
        input { width: 100%; padding: 14px; background: #222; border: 1px solid #333; border-radius: 12px; color: #fff; margin: 10px 0; outline: none; }
    </style>
</head>
<body>

<header>
    <div class="logo" id="open-settings">NEO ⚙️</div>
    <div class="model-tag" id="current-model">GPT-5.3</div>
</header>

<div id="chat-window">
    <div class="bubble ai">Ready. Note: If requests fail, the API's CORS policy may be blocking your browser.</div>
</div>

<div class="input-box">
    <div class="inner-input">
        <textarea id="main-input" placeholder="Message..." rows="1"></textarea>
        <button class="circle-btn" id="send-btn">↑</button>
    </div>
</div>

<div class="overlay" id="settings-overlay">
    <div class="card">
        <h2>Settings</h2>
        <p style="color: #666; font-size: 13px;">API Token</p>
        <input type="password" id="token-field" placeholder="Paste Token...">
        <button onclick="save()" style="width:100%; padding:14px; border-radius:12px; background:#fff; font-weight:bold; border:none;">Connect</button>
    </div>
</div>

<script>
    let TOKEN = localStorage.getItem('ai_token') || '';
    const chatWindow = document.getElementById('chat-window');
    const mainInput = document.getElementById('main-input');
    const overlay = document.getElementById('settings-overlay');

    // --- Helpers ---
    const save = () => {
        TOKEN = document.getElementById('token-field').value.trim();
        localStorage.setItem('ai_token', TOKEN);
        overlay.classList.remove('active');
    };

    document.getElementById('open-settings').onclick = () => {
        document.getElementById('token-field').value = TOKEN;
        overlay.classList.add('active');
    };

    function log(msg, type = 'ai', isImg = false) {
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerHTML = isImg ? `<img src="${msg}">` : msg;
        chatWindow.appendChild(div);
        chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
    }

    // --- API Call ---
    async function talk() {
        const text = mainInput.value.trim();
        if(!text || !TOKEN) return;

        log(text, 'user');
        mainInput.value = '';
        mainInput.style.height = 'auto';

        try {
            const res = await fetch('https://bot.insta-acc-sec.workers.dev/api/v1/chat', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: text,
                    model: "gpt_5_3",
                    systemPrompt: "You are a helpful assistant."
                })
            });

            if(!res.ok) {
                if(res.status === 0) throw new Error("CORS Blocked: The API only allows specific domains.");
                throw new Error(`HTTP ${res.status}`);
            }

            const data = await res.json();
            // Matching the JSON key from your iSH test: "response"
            log(data.response || data.message || "Empty response.");
            
        } catch(e) {
            log(`<span style="color:#ff4444;">Error: ${e.message}</span>`);
        }
    }

    // --- UI Fixes ---
    document.getElementById('send-btn').onclick = talk;

    mainInput.oninput = function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 150) + 'px';
    };

    // Keep Top Bar fixed when keyboard opens
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.body.style.height = window.visualViewport.height + 'px';
        });
    }

    if(!TOKEN) overlay.classList.add('active');
</script>
</body>
</html>
