<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEO LUXE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: #0f0f0f;
            --border: #1a1a1a;
            --neon: #a855f7; /* Luxury Neon Purple */
            --neon-glow: rgba(168, 85, 247, 0.4);
            --text-main: #f8fafc;
            --text-dim: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        html, body { 
            height: 100%; width: 100%; background: var(--bg); color: var(--text-main); 
            overflow: hidden; position: fixed; 
        }

        /* --- Onboarding --- */
        #onboarding {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .step { display: none; width: 100%; max-width: 320px; text-align: center; }
        .step.active { display: block; }
        .lux-input {
            width: 100%; background: var(--surface); border: 1px solid var(--border);
            padding: 14px; border-radius: 12px; color: #fff; margin: 15px 0;
            outline: none; font-size: 14px; text-align: center;
        }
        .lux-input:focus { border-color: var(--neon); box-shadow: 0 0 15px var(--neon-glow); }
        .lux-btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            background: var(--neon); color: #fff; font-weight: 600; cursor: pointer;
        }

        /* --- Layout --- */
        #app-wrapper { height: 100dvh; display: flex; flex-direction: column; width: 100%; }

        header {
            padding: calc(10px + env(safe-area-inset-top)) 20px 10px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); background: rgba(5,5,5,0.8); backdrop-filter: blur(20px);
            z-index: 100;
        }
        .logo { 
            font-weight: 600; font-size: 18px; color: var(--neon); 
            text-shadow: 0 0 10px var(--neon-glow); letter-spacing: 1px; 
        }

        #chat-window {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 20px;
            -webkit-overflow-scrolling: touch;
        }

        /* --- Welcome Splash --- */
        #welcome-splash {
            margin: auto; text-align: center; max-width: 280px; padding-bottom: 50px;
        }
        #welcome-splash h1 { font-size: 24px; font-weight: 500; margin-bottom: 8px; }
        #welcome-splash p { color: var(--text-dim); font-size: 14px; }

        /* --- Messages --- */
        .msg { max-width: 85%; font-size: 15px; line-height: 1.6; }
        .msg.user { align-self: flex-end; color: var(--neon); font-weight: 500; }
        .msg.ai { align-self: flex-start; color: #cbd5e1; }
        .msg.ai img { width: 100%; border-radius: 16px; margin-top: 10px; border: 1px solid var(--border); }

        /* --- Footer & Keyboard Fix --- */
        footer {
            padding: 10px 15px calc(15px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg) 80%, transparent);
        }
        .input-pill {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 24px; padding: 6px 6px 6px 16px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .tools-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
        .tools-row::-webkit-scrollbar { display: none; }
        .tool { 
            font-size: 11px; padding: 5px 12px; border-radius: 20px; 
            border: 1px solid var(--border); color: var(--text-dim); cursor: pointer;
        }
        .tool.active { border-color: var(--neon); color: var(--neon); background: rgba(168,85,247,0.1); }
        
        .type-row { display: flex; align-items: center; gap: 10px; }
        textarea {
            flex: 1; background: none; border: none; color: #fff;
            font-size: 16px; outline: none; resize: none; max-height: 120px; padding: 6px 0;
        }
        .send-btn {
            background: var(--neon); color: #fff; width: 34px; height: 34px;
            border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px var(--neon-glow);
        }

        /* --- Sidebar --- */
        #sidebar {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 500;
            display: none; justify-content: flex-end;
        }
        #sidebar.open { display: flex; }
        .side-card {
            width: 80%; background: var(--surface); padding: 30px 20px;
            border-left: 1px solid var(--border); animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

<div id="onboarding">
    <div class="step active" id="s1">
        <h2 style="margin-bottom: 10px;">Identity</h2>
        <input type="text" id="name-in" class="lux-input" placeholder="Enter Name">
        <button class="lux-btn" onclick="go(2)">Next</button>
    </div>
    <div class="step" id="s2">
        <h2 style="margin-bottom: 10px;">Access</h2>
        <input type="password" id="token-in" class="lux-input" placeholder="API Token">
        <button class="lux-btn" onclick="finish()">Connect NEO</button>
    </div>
</div>

<div id="app-wrapper">
    <header>
        <div class="logo">NEO</div>
        <div style="display: flex; gap: 12px; align-items: center;">
            <select id="model-list" style="background:none; border:1px solid var(--border); color:var(--text-dim); font-size:10px; border-radius:8px; padding:4px;"></select>
            <div onclick="toggleSide(true)" style="font-size: 20px;">⚙️</div>
        </div>
    </header>

    <main id="chat-window">
        <div id="welcome-splash">
            <h1 id="greet-name">Hello.</h1>
            <p>Welcome to Neo. Choose a tool below to begin your luxury AI experience.</p>
        </div>
    </main>

    <footer>
        <div class="input-pill">
            <div class="tools-row">
                <div class="tool active" id="t-chat" onclick="setMode('chat')">Chat</div>
                <div class="tool" id="t-img" onclick="setMode('image/generate')">Photos</div>
                <div class="tool" id="t-logo" onclick="setMode('image/logo')">Logos</div>
            </div>
            <div class="type-row">
                <textarea id="msg-in" placeholder="Message..." rows="1"></textarea>
                <button class="send-btn" id="send-btn">↑</button>
            </div>
        </div>
    </footer>
</div>

<div id="sidebar" onclick="toggleSide(false)">
    <div class="side-card" onclick="event.stopPropagation()">
        <h3 style="margin-bottom: 20px;">AI Personality</h3>
        <textarea id="personality-in" class="lux-input" style="text-align:left; height:200px;" placeholder="Describe how NEO should behave..."></textarea>
        <button class="lux-btn" onclick="saveP()">Save Settings</button>
        <button onclick="localStorage.clear(); location.reload();" style="background:none; border:none; color:red; margin-top:20px; font-size:12px; width:100%;">Reset App</button>
    </div>
</div>

<script>
    let NAME = localStorage.getItem('neo_user');
    let TOKEN = localStorage.getItem('neo_key');
    let PERSONALITY = localStorage.getItem('neo_p') || "You are an elite, concise AI.";
    let currentMode = 'chat';

    // --- Boot ---
    if (!NAME || !TOKEN) {
        document.getElementById('onboarding').style.display = 'flex';
    } else { start(); }

    function go(s) {
        document.getElementById('s1').classList.remove('active');
        document.getElementById('s2').classList.add('active');
    }

    function finish() {
        NAME = document.getElementById('name-in').value;
        TOKEN = document.getElementById('token-in').value;
        localStorage.setItem('neo_user', NAME);
        localStorage.setItem('neo_key', TOKEN);
        start();
    }

    function start() {
        document.getElementById('onboarding').style.transform = 'translateY(-100%)';
        document.getElementById('greet-name').innerText = `Hello, ${NAME}.`;
        document.getElementById('personality-in').value = PERSONALITY;
        fetchModels();
    }

    // --- Controls ---
    function toggleSide(o) { document.getElementById('sidebar').classList.toggle('open', o); }
    function saveP() { 
        PERSONALITY = document.getElementById('personality-in').value; 
        localStorage.setItem('neo_p', PERSONALITY);
        toggleSide(false);
    }
    function setMode(m) {
        currentMode = m;
        document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
        const id = m === 'chat' ? 't-chat' : (m.includes('logo') ? 't-logo' : 't-img');
        document.getElementById(id).classList.add('active');
    }

    // --- API ---
    async function fetchModels() {
        try {
            const res = await fetch('/api/chat', { // hitting the proxy GET
                headers: { 'Authorization': `Bearer ${TOKEN}` }
            });
            const data = await res.json();
            const list = document.getElementById('model-list');
            list.innerHTML = data.models.map(m => `<option value="${m}">${m}</option>`).join('');
        } catch (e) { console.error("Models failed"); }
    }

    async function send() {
    const input = document.getElementById('msg-in');
    const text = input.value.trim();
    if(!text || !TOKEN) return;

    if(document.getElementById('welcome-splash')) document.getElementById('welcome-splash').remove();

    addMsg(text, 'user');
    input.value = '';
    input.style.height = 'auto';

    // Create an empty AI bubble to fill up
    const aiMsgDiv = document.createElement('div');
    aiMsgDiv.className = 'msg ai';
    document.getElementById('chat-window').appendChild(aiMsgDiv);

    try {
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                endpoint: currentMode,
                message: text,
                prompt: text,
                token: TOKEN,
                model: document.getElementById('model-list').value,
                systemPrompt: PERSONALITY
            })
        });

        if (currentMode !== 'chat') {
            const data = await res.json();
            aiMsgDiv.innerHTML = `<img src="${data.image_url}">`;
            return;
        }

        // --- STREAMING LOGIC ---
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let fullText = "";

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            const chunk = decoder.decode(value, { stream: true });
            
            // Note: Depending on your worker output, you might need to 
            // parse "data: {...}" strings. If it's raw text, this works:
            fullText += chunk;
            aiMsgDiv.innerText = fullText; 

            // Keep scrolling as it types
            const win = document.getElementById('chat-window');
            win.scrollTo({ top: win.scrollHeight });
        }
        
    } catch (e) {
        aiMsgDiv.innerHTML = `<span style="color:#ff4444;">Connection Lost</span>`;
    }
}

    
    
    function addMsg(c, r, isI = false) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${r}`;
        div.innerHTML = isI ? `<img src="${c}">` : c;
        win.appendChild(div);
        win.scrollTo({ top: win.scrollHeight, behavior: 'smooth' });
    }

    // --- UI Fixes ---
    document.getElementById('send-btn').onclick = send;
    document.getElementById('msg-in').oninput = function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
    };

    // Keyboard Viewport Fix
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.getElementById('app-wrapper').style.height = window.visualViewport.height + 'px';
            window.scrollTo(0,0);
        });
    }
</script>
</body>
</html>
