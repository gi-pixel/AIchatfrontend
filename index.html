<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f0c;
  --surface:#111714;
  --border:#1f2a24;
  --accent:#00ff9c;
  --text:#e6f1ec;
  --muted:#7d8f86;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
}

/* LOGIN */
#onboarding{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:var(--bg);
  z-index:999;
  padding:20px;
}

.auth{
  width:100%;
  max-width:380px;
}

.logo{
  text-align:center;
  font-size:42px;
  font-weight:700;
  margin-bottom:30px;
}
.logo span{ color:var(--muted); }

.title{
  font-size:34px;
  font-weight:700;
  text-align:center;
}

.subtitle{
  text-align:center;
  color:var(--muted);
  margin:10px 0 30px;
}

.input{
  width:100%;
  padding:16px;
  border-radius:14px;
  border:1px solid var(--border);
  background:var(--surface);
  color:white;
  margin-bottom:16px;
}

.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  background:#0f0f0f;
  color:white;
  font-weight:600;
  font-size:18px;
}

/* APP */
#app{
  display:flex;
  flex-direction:column;
  height:100vh;
}

header{
  display:flex;
  justify-content:space-between;
  padding:14px;
  border-bottom:1px solid var(--border);
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* ChatGPT-like bubbles */
.msg{
  max-width:85%;
  padding:14px 16px;
  border-radius:18px;
  line-height:1.6;
  white-space:pre-wrap;
  font-size:15px;
}

.user{
  align-self:flex-end;
  background:var(--accent);
  color:#001b12;
  font-weight:500;
}

.ai{
  align-self:flex-start;
  background:var(--surface);
  border:1px solid var(--border);
}

/* footer */
footer{
  padding:12px;
  border-top:1px solid var(--border);
}

.input-wrap{
  display:flex;
  gap:10px;
  align-items:center;
}

textarea{
  flex:1;
  background:var(--surface);
  border:1px solid var(--border);
  color:white;
  border-radius:14px;
  padding:14px;
  resize:none;
  outline:none;
}

.send{
  background:var(--accent);
  border:none;
  width:48px;
  height:48px;
  border-radius:14px;
  font-size:18px;
}

select{
  background:var(--surface);
  border:1px solid var(--border);
  color:white;
  padding:6px;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="onboarding">
  <div class="auth">
    <div class="logo">Neo<span>Smith</span></div>
    <div class="title">Welcome back</div>
    <div class="subtitle">Enter your credentials to continue</div>

    <input id="token" class="input" type="password" placeholder="API Token">
    <button class="btn" onclick="login()">Continue</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div>Neo</div>
    <select id="models"></select>
  </header>

  <main id="chat"></main>

  <footer>
    <div class="input-wrap">
      <textarea id="msg" rows="1" placeholder="Message..."></textarea>
      <button class="send" onclick="send()">↑</button>
    </div>
  </footer>
</div>

<script>
let TOKEN = localStorage.getItem('neo_key');

if(TOKEN){
  document.getElementById('onboarding').style.display='none';
  loadModels();
}

function login(){
  TOKEN=document.getElementById('token').value;
  localStorage.setItem('neo_key',TOKEN);
  document.getElementById('onboarding').style.display='none';
  loadModels();
}

/* MODEL FETCH FIX */
async function loadModels(){
  const res=await fetch('/api/chat',{
    headers:{Authorization:`Bearer ${TOKEN}`}
  });
  const data=await res.json();

  const select=document.getElementById('models');
  select.innerHTML='';
  data.forEach(m=>{
    let o=document.createElement('option');
    o.value=m;
    o.textContent=m;
    select.appendChild(o);
  });
}

/* ADD MESSAGE */
function addMsg(text,type){
  const div=document.createElement('div');
  div.className='msg '+type;
  div.textContent=text;
  document.getElementById('chat').appendChild(div);
  div.scrollIntoView();
  return div;
}

/* CLEAN MARKDOWN */
function clean(text){
  return text.replace(/[*#`_>-]/g,'');
}

/* SMOOTH STREAM (WORD-BY-WORD FEEL) */
async function send(){
  const input=document.getElementById('msg');
  const text=input.value.trim();
  if(!text) return;

  addMsg(text,'user');
  input.value='';

  const bubble=addMsg('','ai');

  const res=await fetch('/api/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      message:text,
      token:TOKEN,
      endpoint:'chat',
      model:document.getElementById('models').value
    })
  });

  const reader=res.body.getReader();
  const decoder=new TextDecoder();

  let full='';
  let queue=[];

  function type(){
    if(queue.length){
      full += queue.shift();
      bubble.textContent = clean(full);
      bubble.scrollIntoView();
      setTimeout(type, 15); // typing speed
    }
  }

  while(true){
    const {done,value}=await reader.read();
    if(done) break;

    const chunk=decoder.decode(value);
    queue.push(...chunk.split(''));
    if(queue.length === chunk.length) type();
  }
}
</script>

</body>
</html>
